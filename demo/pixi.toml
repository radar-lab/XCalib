[workspace]
authors = ["RADAR Lab"]
channels = ["conda-forge"]
platforms = ["linux-aarch64", "linux-64", "win-64"]

[dependencies]
python = ">=3.10,<3.13"
h5py = ">=3.11,<4"
numpy = ">=2.0,<3"
# For xcalib_quickstart.ipynb: jupyterlab is the notebook front-end (`pixi run
# notebook`), ipykernel makes this env the kernel, matplotlib renders the inline
# overlays. VS Code users only need ipykernel (pick this env as the kernel).
matplotlib = ">=3.7"
ipykernel = ">=6"
jupyterlab = ">=4"

[pypi-dependencies]
# Editable install from the repo source, so the demo env always tracks src/xcalib
# (no same-version-wheel staleness). Released installs use the published wheel /
# `pip install XCalib`; the notebook's Colab cell uses pip too.
xcalib = { path = "..", editable = true, extras = ["onnx"] }

[activation.env]
# Windows: torch/MKL and onnxruntime/opencv each bundle an OpenMP runtime; allow
# both to load. The demo is inference-only, so the duplicate-runtime risk is moot.
KMP_DUPLICATE_LIB_OK = "TRUE"

[tasks]
run-00 = "python run_00_prepare_assets.py"
run-01 = "python run_01_match_one_frame.py"
run-02 = "python run_02_calibrate_stream.py"
run-03 = "python run_03_full_demo.py"
notebook = "jupyter lab xcalib_quickstart.ipynb"
