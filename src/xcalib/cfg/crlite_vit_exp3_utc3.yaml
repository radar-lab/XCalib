# CRLite-ViT Exp3 (Crop ViT + PointNet + Enhanced 3D PE) — UTC3.
model: crlite_vit_exp3
device: auto
num_classes: 10
crop_size: 64
point_cloud_size: 1024
embed_dim: 256
token_len: 256
max_depth: 100.0
top_k: 10
vit:
  patch_size: 8
  embed_dim: 256
  depth: 6
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.0
  attention_dropout: 0.0
  pool: cls
bbox_expansion: 1.05
weights_path: checkpoints/crlite_vit_exp3_utc3_best.pth
